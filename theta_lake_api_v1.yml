        status_string:
          $ref: '#/components/schemas/StatusString200'
        request_id:
          $ref: '#/components/schemas/RequestId'
        status:
          type: string
          description: The delete response status message
          example: Retention library successfully deleted
    escalated_comment:
      type: object
      properties:
        created_at:
          $ref: '#/components/schemas/created_at'
        escalation_type:
          type: string
          description: Type of escalation
          example: request for information
        classification_id:
          type: integer
          example: 699590
          description: The classification ID
        detection_rule:
          type: object
          description: Details about the detection rule that triggered the comment
          properties:
            id:
              type: integer
              description: Unique identifier for the detection rule
            name:
              type: string
              description: Name of the detection rule (e.g., "Sensitive Data Detection")
        flag:
          type: string
          description: Will always be "escalate" for escalated comments
          example: escalate
        id:
          type: integer
          description: The ID of the comment
          example: 12345
        parent_id:
          type: integer
          nullable: true
          description: The ID of the parent comment, if this comment is a reply
          example: 12344
        particpant:
          type: object
          description: The participant associated with the escalated comment
          properties:
            email:
              type: string
              format: email
              description: Email address of the participant associated with the escalated comment
              example: jane@email.com
            role:
              type: string
              description: Role of the participant in the escalation
              example: passivemember
        record_id:
          type: integer
          description: The record ID the comment is associated with
          example: 501263
        shareable_link:
          type: string
          format: uri
          description: A shareable link to the escalated comment
          example: https://app.thetalake.com/a164acced555c3cac7c79d7afd513e81656f72cc145c94d8aa7b0a409ebb3f62
        text:
          type: string
          description: The text content of the comment
          example: User comment text
        updated_at:
          $ref: '#/components/schemas/updated_at'
        user_id:
          type: integer
          nullable: true
          description: The ID of the user who created the comment. Will be null if the comment is a system comment
    EscalatedCommentsResponse:
      type: object
      properties:
        status_code:
          $ref: '#/components/schemas/StatusCode200'
        status_string:
          $ref: '#/components/schemas/StatusString200'
        request_id:
          $ref: '#/components/schemas/RequestId'
        escalated_comments:
          type: array
          description: An array of escalated comments
          items:
            $ref: '#/components/schemas/escalated_comment'
    GetRolesResponse:
      type: object
      properties:
        status_code:
          $ref: '#/components/schemas/StatusCode200'
        status_string:
          $ref: '#/components/schemas/StatusString200'
        request_id:
          $ref: '#/components/schemas/RequestId'
        roles:
          type: array
          description: An array of role objects
          items:
            type: object
            properties:
              created_at:
                type: string
                format: date-time
                description: Only included in custom roles. Role creation timestamp using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
                example: '2021-06-16T01:37:04.262Z'
              default:
                type: boolean
                description: Indicates if this role is the default role
                example: false
              description:
                type: string
                description: A description of the role
                example: Permissions for a user tasked solely with reviewing content.
              id:
                type: integer
                description: The role ID
                example: 1
              is_built_in:
                type: boolean
                description: Indicates if the role is built in or custom
                example: true
              name:
                type: string
                description: The role's name
                example: Reviewer
              number_of_users:
                type: integer
                description: The number of users currently assigned to this role
                example: 10
              updated_at:
                type: string
                format: date-time
                description: Only included in custom roles. Role updated timestamp using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
                example: '2022-10-12T02:29:49.146Z'
    PostSearchBody:
      type: object
      properties:
        attachments:
          type: object
          properties:
            attachment_count:
              type: object
              properties:
                min:
                  type: integer
                  description: The minimum number of attachments to search for
                  example: 1
                max:
                  type: integer
                  description: The maximum number of attachments to search for
                  example: 10
        comments:
          type: object
          properties:
            flags:
              type: array
              description: The comment flags to search for. If multiple comment flags are given, the search will use an OR operator
              items:
                type: string
                enum:
                  - cleared
                  - confirmed_risk
                  - escalated
                  - false_detection
                  - noteworthy
              example:
                - confirmed_risk
            author_name:
              type: array
              description: The name of the comment author to search for
              items:
                type: string
              example:
                - John Doe
                - Jane Smith
            author_email:
              type: array
              description: The email of the comment author to search for
              items:
                type: string
              example:
                - john.doe@example.com
                - jane.smith@example.com
        cases:
          type: object
          description: The [cases](/documentation/search#cases) attributes for the record
          properties:
            filter_type:
              type: string
              example: is
              enum:
                - is
                - is_not
              description: The operator to search with, defaults to *is*
            ids:
              type: array
              description: The case IDs to search for. If multiple case IDs are given, the search will use an OR operator
              items:
                type: integer
                example: 1234
        content:
          type: array
          description: Search for content in records. This uses [dynamic rate limiting](/documentation/search#dynamic-rate-limits)
          items:
            type: object
            properties:
              operator:
                type: string
                enum:
                  - and
                  - or
                example: and
                description: The operator to search with, defaults to "or"
              query:
                type: string
                example: ("keep it" | just) + "between us"
                description: The query to search with
              scopes:
                type: array
                description: The parts of the records that you would like to search with against. If not specified, all parts of the record will be searched
                items:
                  enum:
                    - attachment_name
                    - attachment_text
                    - chat_text
                    - conference_chat
                    - document_text
                    - email_extended_body
                    - email_headers
                    - email_smart_body
                    - image_text
                    - journal_headers
                    - media_title
                    - screen_text
                    - transcript
                  type: string
                example:
                  - attachment_name
                  - attachment_text
                  - chat_text
                  - conference_chat
                  - document_text
                  - email_extended_body
                  - email_headers
                  - email_smart_body
                  - image_text
                  - journal_headers
                  - media_title
                  - screen_text
                  - transcript
        content_source:
          type: array
          items:
            type: string
          description: Each [content source](/documentation/search#content-source) is used with an OR operator. If 2 content_source's are given, records from both content_source's will be searched.
          example:
            - microsoft_teams
            - webex_meetings_ecomms
        email:
          type: object
          properties:
            duplicate_count:
              type: object
              properties:
                min:
                  type: integer
                  description: The minimum number of emails that have been duplicated
                  example: 1
                max:
                  type: integer
                  description: The maximum number of emails that have been duplicated
                  example: 10
            duplicate_date:
              type: object
              properties:
                start:
                  type: string
                  format: date-time
                  description: '**Inclusive** start of the date range using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)'
                  example: '2021-06-14T01:37:04.262Z'
                end:
                  type: string
                  format: date-time
                  description: '**Inclusive** end of the date range using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6), defaults to current date'
                  example: '2022-06-16T01:37:04.262Z'
        identities:
          type: object
          properties:
            ids:
              type: array
              description: This list is limited to 1 id per search
              items:
                type: integer
                example: 7
        media:
          type: array
          items:
            type: string
            enum:
              - audio
              - chat
              - document
              - email
              - other
              - video
            example: audio
          description: The record [media type](/documentation/search#media). If multiple media types are given, the search will use an OR operator
        participants:
          type: object
          description: The [participants](/documentation/search#participants) attributes for the record
          properties:
            operator:
              type: string
              example: AND
              enum:
                - AND
                - OR
              description: The operator to search with
            attributes:
              type: array
              description: The attribute to search on
              items:
                type: object
                properties:
                  attribute:
                    type: string
                    enum:
                      - email
                      - first_name
                      - id
                      - last_name
                      - location
                      - name
                      - phone_number
                      - extension
                      - org_relationship
                      - primary_domain
                      - all_domains
                    example: email
                    description: The type of attribute to search on
                  participant_information:
                    type: string
                    example: user@thetalake.com
                    description: The value of the attribute to search with
            identity_ids:
              type: array
              description: The identity IDs to search for. Limited to 1 identity_id per search
              items:
                type: integer
                example: 1
                minimum: 1
                maximum: 1
        people:
          type: object
          properties:
            communication_direction:
              type: object
              description: Filter records based on the direction of communication (internal vs external participants)
              properties:
                internal_sender:
                  type: boolean
                  description: Include records where the sender is internal to the organization
                  example: true
                internal_receiver:
                  type: boolean
                  description: Include records where the receiver is internal to the organization
                  example: true
                external_sender:
                  type: boolean
                  description: Include records where the sender is external to the organization
                  example: false
                external_receiver:
                  type: boolean
                  description: Include records where the receiver is external to the organization
                  example: false
            supervision_spaces:
              type: object
              properties:
                ids:
                  type: array
                  description: The IDs of the supervision spaces to search in. If multiple supervision space IDs are given, the search will use an OR operator. Supervision space IDs can be found in the [list all supervision spaces](/api-reference#get-/supervision_spaces) endpoint
                  items:
                    type: integer
                  example:
                    - 123456
                    - 789012
        platform:
          type: object
          description: Filters related to the platform that captured the record
          properties:
            integrations:
              type: object
              properties:
                ids:
                  type: array
                  description: The IDs of the integration that captured the records. If multiple integration IDs are given, the search will use an OR operator. Integration IDs can be found in the [list all integrations](/api-reference#get-/integrations) endpoint
                  items:
                    type: integer
                  example:
                    - 1234
                    - 5678
        policy_detections:
          type: object
          description: Filters related to policy detections
          properties:
            analyzed:
              type: boolean
              description: Search for records that have been analyzed by Theta Lake's risk engine. If true, only analyzed records will be returned. If false, only unanalyzed records will be returned.
            policy_hits:
              type: object
              description: Policy hits that triggered on the record
              properties:
                inclusion:
                  type: string
                  enum:
                    - is
                    - is_not
                  example: is
                policy_hit:
                  type: array
                  description: The `id` from the [list all policy_hits](/api-reference#get-/analysis/policy_hits) endpoint
                  items:
                    type: integer
                  example:
                    - 640
            quantity:
              type: object
              description: The quantity of policy hits to search for
              properties:
                min:
                  type: integer
                  description: The minimum number of policy hits to search for
                  example: 1
                max:
                  type: integer
                  description: The maximum number of policy hits to search for
                  example: 10
        range:
          type: object
          description: A date [range](/documentation/search#range) to search on. If no range is provided, the system defaults to the last 7 days from the current date. The default type is `upload_date`. All dates are inclusive. This range is subject to [dynamic rate limits](/documentation/search#dynamic-rate-limits)
          properties:
            type:
              type: string
              enum:
                - create_date
                - upload_date
                - processed_date
              description: The type date range, default is *upload_date*
              example: upload_date
            start:
              type: string
              format: date-time
              description: '**Inclusive** start of the date range using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)'
              example: '2021-06-14T01:37:04.262Z'
            end:
              type: string
              format: date-time
              description: '**Inclusive** end of the date range using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6), defaults to current date'
              example: '2022-06-16T01:37:04.262Z'
        risk:
          description: The analyzed risk of the record. If not_analyzed is passed, only not_analyzed records will be found. Other risks will be used as a OR operator
          type: array
          items:
            type: string
            enum:
              - low
              - slight
              - medium
              - high
              - not_analyzed
          example:
            - low
            - slight
        sort:
          type: object
          description: Sort by attribute of the results. See [this documentation](/documentation/search#sort) for more details
          properties:
            by:
              type: string
              enum:
                - create_date
                - upload_date
                - processed_date
              example: create_date
              description: How to sort the results, default is *upload_date*
            order:
              type: string
              enum:
                - asc
                - desc
              example: desc
              description: How to sort the results, default is *desc*
        workflow:
          type: object
          description: Search records related to workflows
          properties:
            name:
              type: object
              properties:
                id:
                  type: array
                  description: The workflow name to search for by id. If multiple workflow ids are given, the search will use an OR operator. Ids can be found in the [list all workflows](/api-reference#get-/workflows) endpoint
                  items:
                    type: integer
                  example:
                    - 1
                    - 2
            state:
              type: object
              properties:
                inclusion:
                  type: string
                  example: is
                  enum:
                    - is
                    - is_not
                  description: The operator to search with, defaults to *is*
                id:
                  type: array
                  description: The workflow state ids to search for. If multiple ids are given, the search will use an OR operator. Ids can be found in the [list all states for a workflow](/api-reference#get-/workflows/-id-/states) endpoint
                  items:
                    type: integer
                  example:
                    - 1
                    - 2
    schemas-participant:
      description: 'The key in this object is the participants role. It can be one of: **activemember,additional_recipient,attendee,callee,caller,co-host,collaborator,creator,host,on_behalf_of,panelist,passivemember,recipient,recipient_bcc,recipient_cc,sender**'
      type: object
      properties:
        email:
          type: string
          description: Participant's email, if null the content source did not provide the information
          nullable: true
        id:
          type: string
          description: The id given to the participant from the platform
          example: '1202498425120564'
        join_leave_info:
          type: array
          nullable: true
          description: Participant's join and leave times, if null the content source did not provide the information
          items:
            type: object
            properties:
              join_time:
                type: string
                format: date-time
                description: Participant's join time using [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
                example: '2022-10-12T02:29:49.146Z'
              leave_time:
                type: string
                format: date-time
                description: Participant's leave time using [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
                example: '2022-10-12T02:29:49.146Z'
        name:
          type: string
          description: Participant's first name, if null the content source did not provide the information
          nullable: true
        org_relationship:
          type: string
          description: Participant's org relationship, if null the content source did not indicate
          nullable: true
    records:
      type: object
      properties:
        analyzed:
          type: boolean
          description: Indicates if the record has been analyzed
          example: true
        attachment_count:
          type: integer
          description: The number of attachments associated with the record
          example: 3
        communication_direction:
          type: object
          nullable: true
          description: The communication direction information for the record, indicating whether participants are internal or external to the organization
          properties:
            internal_sender:
              type: boolean
              nullable: true
              description: Indicates if the sender is internal to the organization
              example: true
            internal_receiver:
              type: boolean
              nullable: true
              description: Indicates if the receiver is internal to the organization
              example: true
            external_sender:
              type: boolean
              nullable: true
              description: Indicates if the sender is external to the organization
              example: false
            external_receiver:
              type: boolean
              nullable: true
              description: Indicates if the receiver is external to the organization
              example: false
        content_source:
          type: string
          description: The content source of the record
          example: microsoft_teams
        content_type:
          type: string
          description: The content-type of the data. Uses standard [MIME types](https://www.iana.org/assignments/media-types/media-types.xhtml)
          example: video/mp4
        create_date:
          $ref: '#/components/schemas/created_at'
        data_path:
          type: string
          description: The path to the record in the the cloud storage. Only populated if the storage is BYOS
          example: 2025-01-01/data/95292686-cbbb-b8c0-0351-25dab7c2154d
        entitlement_spaces_ids:
          type: array
          description: The IDs of the detected entitlement supervision spaces. Only populated if record is associated with multiple supervision spaces
          items:
            type: integer
          example:
            - 123456
        hash_sha256:
          type: string
          description: The record's SHA256 hash
          example: 5179a08ff65e6388a466447dd1c6ee5fae0c9b080ec3a61e21cd6818ed1d8624
        id:
          type: integer
          description: The record ID
          example: 215779
        integration:
          type: object
          description: The integration that captured the record
          properties:
            id:
              type: integer
              description: The integration ID
            name:
              type: string
              description: The integration name
        media_type:
          type: string
          description: The record's Theta Lake media type
          example: Audio
          enum:
            - AI Interaction
            - Audio
            - Chat
            - Document
            - Email
            - Other
            - Video
        original_file_name:
          type: string
          description: The record's filename
          example: Call Between Jim and Pam.mp3
        participants:
          nullable: true
          type: object
          description: The record's participants. The keys are participant roles (e.g. active-member, owner, passive-member) mapping to arrays of participant objects. Participant attributes vary by content source and availability.
          example:
            active-member:
              - email: john@thetalake.com
                id: '1236549872321682'
                join_leave_info:
                  - join_time: '2024-10-08T14:40:06Z'
                    leave_time: '2024-10-08T15:00:59Z'
                name: John Doe
                org_relationship: internal
            owner:
              - email: john@thetalake.com
                extension: '125'
                id: '1236549872321682'
                join_leave_info:
                  - join_time: '2024-10-08T14:40:06Z'
                    leave_time: '2024-10-08T15:00:59Z'
                name: John Doe
                org_relationship: unknown
                phone_number: '18005240822'
            passive-member:
              - email: john@thetalake.com
                id: '1236549872321682'
                join_leave_info:
                  - join_time: '2024-10-08T14:40:06Z'
                    leave_time: '2024-10-08T15:00:59Z'
                name: John Doe
                org_relationship: null
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/schemas-participant'
        platform_attributes:
          type: object
          nullable: true
          description: A map of key value pairs of the records platform attributes
          example:
            call_id: 2909b385-f84c-4935-bef0-87e6c6a3939b
            channel_id: '4'
            duration: 1h02m29s
        processed_date:
          type: string
          format: date-time
          description: Record processed timestamp using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
          example: '2022-10-12T02:29:49.146Z'
          nullable: true
        record_size:
          type: integer
          description: The record's file size in bytes
          example: 215779
        risk:
          type: string
          description: The record's risk
          example: low
        supervision_space_id:
          type: integer
          description: The supervision space ID that correlates to the record. If set to `null` the record is not associated with a supervision space
          nullable: true
          example: 123456
        upload_date:
          type: string
          format: date-time
          description: Record upload timestamp using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
          example: '2022-10-12T02:29:49.146Z'
        uuid:
          type: string
          description: The record's UUID. This UUID matches the portal record ID
          example: 95292686-cbbb-b8c0-0351-25dab7c2154d
    PostSearchResponseNew:
      type: object
      properties:
        status_code:
          $ref: '#/components/schemas/StatusCode200'
        status_string:
          $ref: '#/components/schemas/StatusString200'
        request_id:
          $ref: '#/components/schemas/RequestId'
        paging:
          $ref: '#/components/schemas/Pagination'
        result:
          type: object
          properties:
            created_at:
              $ref: '#/components/schemas/created_at'
            id:
              type: number
              description: The id of the search
              example: 543
            total_hits:
              type: number
              description: This is the total hits for this search. This value will not change during pagination
              example: 24123
            records:
              type: array
              items:
                $ref: '#/components/schemas/records'
    PostSearchBodyIds:
      type: object
      properties:
        id:
          type: array
          items:
            type: integer
            example: 1520
          description: The record ID. If multiple record IDs are given, the search will use an OR operator. Limit of 100 IDs can be provided.
        uuid:
          type: array
          items:
            type: string
            example: 971219f9-3a00-3f2e-e835-55e7e2cfcc36
          description: The record UUID. If multiple record UUIDs are given, the search will use an OR operator. Limit of 100 UUIDs can be provided.
        sort:
          type: object
          description: Sort by attribute of the results. See [this documentation](/documentation/search#sort) for more details
          properties:
            by:
              type: string
              enum:
                - create_date
                - upload_date
              example: create_date
              description: How to sort the results, default is *upload_date*
            order:
              type: string
              enum:
                - asc
                - desc
              example: desc
              description: How to sort the results, default is *desc*
    GetSearchResponse:
      type: object
      properties:
        status_code:
          $ref: '#/components/schemas/StatusCode200'
        status_string:
          $ref: '#/components/schemas/StatusString200'
        request_id:
          $ref: '#/components/schemas/RequestId'
        paging:
          $ref: '#/components/schemas/Pagination'
        searches:
          type: array
          description: An array of search objects
          items:
            type: object
            properties:
              created_at:
                $ref: '#/components/schemas/created_at'
              description:
                type: string
                nullable: true
                description: A description for the saved search
                example: Search to find all datums from March
              hits:
                type: integer
                nullable: true
                description: The number of datums this search will return
                example: 42
              id:
                type: integer
                description: The ID for the security filter search
                example: 59
              name:
                type: string
                description: The security filter's name
                example: Zoom chat only
              type:
                type: string
                description: The type of saved search
                example: history
              updated_at:
                $ref: '#/components/schemas/updated_at'
    PostSearchResponse:
      type: object
      properties:
        status_code:
          $ref: '#/components/schemas/StatusCode200'
        status_string:
          $ref: '#/components/schemas/StatusString200'
        request_id:
          $ref: '#/components/schemas/RequestId'
        paging:
          $ref: '#/components/schemas/Pagination'
        records:
          type: array
          items:
            $ref: '#/components/schemas/records'
    PostResetRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          description: The reason for resetting and reentering workflow
          example: A good reason here
    PostResetResponse:
      type: object
      properties:
        status_code:
