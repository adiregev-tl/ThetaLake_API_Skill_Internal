                    description: Description of the audited action
                    example: Some descriptive text here
                  id:
                    type: string
                    description: Audit log ID
                    example: 01986140-69eb-7c71-b8fe-2fb5a943dd90
                  user:
                    type: object
                    nullable: true
                    properties:
                      email:
                        type: string
                        description: The user's email address
                        example: john@smith.com
                      id:
                        type: integer
                        description: User ID
                        example: 23
                      name:
                        type: string
                        description: The user's name
                        example: John Smith
                  workspace:
                    type: object
                    properties:
                      archive_only:
                        type: boolean
                        format: boolean
                        description: True if the workspace is archive only
                        example: true
                      id:
                        type: integer
                        description: Workspace ID
