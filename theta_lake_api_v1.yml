              id: 599
              sent_at: '2021-06-16T01:37:04.262Z'
            - destination: sftp.thetalake.com/uploads
              handle: ZOOMCHAT_20223420610.000000_2024061123150.2123315959_2052352240611.180001
              id: 600
              sent_at: '2021-06-16T01:37:04.262Z'
        data_path:
          type: string
