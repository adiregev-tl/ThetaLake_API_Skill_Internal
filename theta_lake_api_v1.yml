components:
  securitySchemes:
    BearerAuth:
      type: http
      description: JWT based API token
      scheme: bearer
      bearerFormat: JWT
    ClientCredentials:
      type: oauth2
      x-receive-token-in: request-body
      description: Client credential OAuth2.0 flow
      flows:
        clientCredentials:
          tokenUrl: /token
          scopes: {}
  schemas:
    StatusCode200:
      type: integer
      description: HTTP response status code
      example: 200
    StatusString200:
      type: string
      description: Text description of the HTTP response status code
      example: OK
    RequestId:
      type: string
      description: Unique identifier (UUID) for the request
      example: ca116f96-bbd5-11ef-9468-53af98260bba
    redaction_policy:
      type: object
      description: Will be set to null if the policy does not have a redaction policy
      nullable: true
      properties:
        id:
          type: integer
          description: The ID of the redaction policy
          example: 1
        name:
          type: string
          description: The redaction policy name
          example: 'Redaction Policy: PCI'
    policy:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
          nullable: true
          description: The policy creation timestamp using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Will be null if the policy is built in.
          example: '2023-03-13T18:54:09.000Z'
        description:
          type: string
          description: The policy description
          example: All Detections Active.
        id:
          type: integer
          description: The policy ID
          example: 147
        is_built_in:
          type: boolean
          description: Indicates if this is a built in policy
          example: true
        name:
          type: string
          description: The policy name
          example: All Detections Actives
        redaction_policy:
          $ref: '#/components/schemas/redaction_policy'
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: The policy last update timestamp using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Will be null if the policy is built in.
          example: '2024-08-07T23:23:45.000Z'
    ListAllPoliciesResponse:
      type: object
      properties:
        status_code:
          $ref: '#/components/schemas/StatusCode200'
        status_string:
          $ref: '#/components/schemas/StatusString200'
        request_id:
          $ref: '#/components/schemas/RequestId'
        policies:
          type: array
          items:
            $ref: '#/components/schemas/policy'
    detection_rule:
      type: object
      properties:
        active:
          type: boolean
          description: Indicates if the detection rule is active in the policy
          example: true
        beta:
          type: boolean
          description: Indicates if the detection rule is in beta
          example: false
        id:
          type: integer
          description: The ID of the detection rule
          example: 385
        is_multi_language_supported:
          type: boolean
          description: Indicates if the detection rule supports multiple languages
          example: true
        media_types:
          type: array
          items:
            type: string
            enum:
              - Audio
              - Chat
              - Document
              - Email
              - Other
              - Video
          description: List of media types the detection rule applies to
          example:
            - Video
            - Audio
            - Chat
        name:
          type: string
          description: The name of the detection rule
          example: Office and Document Apps
        risk_type:
          type: string
          description: The risk classification of the detection rule
          example: information
          enum:
            - information
            - risk
            - validation
            - disabled
    SwrvInputSource:
      type: object
      properties:
        name:
          type: string
          description: The name of the input source
          example: Any
        integration:
          type: object
          nullable: true
          properties:
            id:
              type: integer
              description: The ID of the integration
              example: 2345
            name:
              type: string
              description: The name of the integration
              example: Zoom Chat
            type:
              type: string
              description: The type of the input source
              example: integration
              enum:
                - integration
                - all_integration_uploads
                - all_submission_portal_uploads
                - all_uploads
                - all_user_uploads
    SwrvPolicy:
      type: object
      properties:
        id:
          type: integer
          description: The ID of the policy
          example: 147
        name:
          type: string
          description: The name of the policy
          example: All Detections Active
    SwrvRetentionLibrary:
      type: object
      properties:
        id:
          type: integer
          description: The ID of the retention library
          example: 1
        name:
          type: string
          description: The name of the retention library
          example: Test Bucket - update2 - US West (Oregon)
    SwrvSearch:
      type: object
      nullable: true
      properties:
        id:
          type: integer
          description: The ID of the saved search
          example: 739139
        name:
          type: string
          description: The name of the search
          example: All org users
    SwrvSupervisionSpace:
      type: object
      nullable: true
      properties:
        id:
          type: integer
          description: The ID of the supervision space
          example: 10420
        name:
          type: string
          description: The name of the supervision space
          example: Executive Team
    SwrvWorkflow:
      type: object
      properties:
        id:
          type: integer
          description: The ID of the workflow
          example: 14536
        name:
          type: string
          description: The name of the workflow
          example: My workflow
    SwrvRule:
      type: object
      properties:
        default_rule:
          type: boolean
          description: Indicates if this is the default SWRV rule
          example: false
        description:
          type: string
          nullable: true
          description: Description of the SWRV rule
          example: My SWRV rule
        id:
          type: integer
          description: The ID of the SWRV rule
          example: 2337
        input_source:
          type: array
          description: List of input sources for the SWRV rule
          items:
            $ref: '#/components/schemas/SwrvInputSource'
        is_built_in:
          type: boolean
          description: Indicates if this is a built-in SWRV rule
          example: true
        name:
          type: string
          description: The name of the SWRV rule
          example: swrv-example
        policy:
          $ref: '#/components/schemas/SwrvPolicy'
        priority:
          type: integer
          description: The priority of the SWRV rule (lower numbers have higher priority)
          example: 4
        retention_library:
          $ref: '#/components/schemas/SwrvRetentionLibrary'
        search:
          $ref: '#/components/schemas/SwrvSearch'
        supervision_space:
          $ref: '#/components/schemas/SwrvSupervisionSpace'
        workflow:
          $ref: '#/components/schemas/SwrvWorkflow'
    policy_details:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
          nullable: true
          description: The policy creation timestamp using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Will be null if the policy is built in.
          example: '2023-03-13T18:54:09.000Z'
        description:
          type: string
          description: The policy description
          example: All Detections Active.
        detection_rules:
          type: array
          description: List of detection rules in the policy
          items:
            $ref: '#/components/schemas/detection_rule'
        id:
          type: integer
          description: The policy ID
          example: 147
        is_built_in:
          type: boolean
          description: Indicates if this is a built-in policy
          example: true
        name:
          type: string
          description: The policy name
          example: All Detections Active
        redaction_policy:
          $ref: '#/components/schemas/redaction_policy'
        swrv_rules:
          type: array
          description: List of SWRV rules associated with the policy
          items:
            $ref: '#/components/schemas/SwrvRule'
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: The policy last update timestamp using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Will be null if the policy is built in.
          example: '2024-08-07T23:23:45.000Z'
    GetPolicyByIdResponse:
      type: object
      properties:
        status_code:
          $ref: '#/components/schemas/StatusCode200'
        status_string:
          $ref: '#/components/schemas/StatusString200'
        request_id:
          $ref: '#/components/schemas/RequestId'
        policy:
          $ref: '#/components/schemas/policy_details'
    policy_hit:
      type: object
      properties:
        id:
          type: integer
          description: The policy hit id
          example: 1234
        name:
          type: string
          description: The policy hit name
          example: Audio Unclear
    ListAllPolicyHitsResponse:
      type: object
      properties:
        status_code:
          $ref: '#/components/schemas/StatusCode200'
        status_string:
          $ref: '#/components/schemas/StatusString200'
        request_id:
          $ref: '#/components/schemas/RequestId'
        policy_hits:
          type: array
          items:
            $ref: '#/components/schemas/policy_hit'
