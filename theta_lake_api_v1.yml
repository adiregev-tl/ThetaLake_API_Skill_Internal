      summary: Search identities
      description: |
        **REQUIRED PERMISSION:** `identities:read`  
        **RATE LIMIT:** `light`  
        **NOTE**: If managed is not provided, or set to false, the start and end dates cannot be more than 7 days apart. If start and end  
        date are not provided, they will default to the last 7 days.
      parameters:
        - name: date_type
          in: query
          required: false
          schema:
            type: string
            default: updated_at
            enum:
              - created_at
              - updated_at
          description: The date type to search by. If not provided, the default is `updated_at`
          example: updated_at
        - name: end
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: '**Inclusive** end of the date range using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Will default to current date if managed is set to false, or not provided'
        - name: managed
          in: query
          required: false
          schema:
            type: boolean
          description: Denotes if only managed identities should be returned. Identities are managed if they are created by the API, CSV upload, or Active Directory sync
        - name: max
          in: query
          description: The max number of items in each page; default is 25
          required: false
          schema:
            type: integer
            example: 25
            default: 25
            minimum: 1
            maximum: 500
        - name: page_token
          in: query
          description: The page token to query next, this comes from the `paging` in the response. This can be either `next_page_token` or `prev_page_token`
          required: false
          schema:
            type: string
        - name: start
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: '**Inclusive** start of the date range using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Will default to current date if managed is set to false, or not provided'
