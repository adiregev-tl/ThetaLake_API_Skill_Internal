    PostChatConversationBody:
      type: object
      properties:
        meta:
          type: object
          required:
            - file_name
            - identity_data
            - create_date
          properties:
            create_date:
              $ref: '#/components/schemas/create_date'
            custom_transport_type:
              $ref: '#/components/schemas/custom_transport_type'
            file_name:
              type: string
              description: This is the **title** of the chat conversation. It appears as the record title in the Theta Lake Portal. When you search by 'media title' in the Portal, you search for this text.
              example: Chat between Jim and Pam
            identity_data:
              $ref: '#/components/schemas/identity_data'
            platform_attributes:
              $ref: '#/components/schemas/platform_attributes'
            participants:
              $ref: '#/components/schemas/chat_participants'
        chat:
          type: object
          required:
            - application
            - conversation
            - participants
            - messages
            - attachments
          properties:
            application:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: The name of the chat application
                  example: Teams
            conversation:
              type: object
              required:
                - id
                - name
                - begin_time
                - end_time
              properties:
                id:
                  type: string
                  description: The chat conversation's ID
                  example: some-id-string-here-2
                name:
                  type: string
                  description: The chat conversation's name
                  example: Conversation between Jim and Pam
                begin_time:
                  type: string
                  format: date-time
                  description: The chat conversation's begin time in [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
                  example: '2023-12-09T13:13:50.925Z'
                end_time:
                  type: string
                  format: date-time
                  description: The chat conversation's end time in [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
                  example: '2023-12-09T17:13:50.925Z'
                previous_uuid:
                  type: string
                  description: The UUID of the conversation's previous chat messages. Required if connecting chat messages into a conversation.
                  example: UUID to previous chat message
            messages:
              type: array
              items:
                type: object
                required:
                  - id
                  - participant_id
                  - text
                  - content_type
                  - timestamp
                properties:
                  id:
                    $ref: '#/components/schemas/message_id'
                  participant_id:
                    $ref: '#/components/schemas/activemember_participant_id'
                  text:
                    $ref: '#/components/schemas/message_text'
                  content_type:
                    $ref: '#/components/schemas/message_content_type'
                  timestamp:
                    $ref: '#/components/schemas/message_timestamp'
                  deleted_timestamp:
                    $ref: '#/components/schemas/deleted_timestamp'
                  edited_message_id:
                    $ref: '#/components/schemas/edited_message_id'
                  reaction_to_message_id:
                    $ref: '#/components/schemas/reaction_to_message_id'
                  reply_to_message_id:
                    $ref: '#/components/schemas/reply_to_message_id'
                  attachment_ids:
                    $ref: '#/components/schemas/attachment_ids'
                  importance:
                    type: object
                    required:
                      - type
                    properties:
                      text:
                        type: string
                        description: A description of why this message is important
                      type:
                        type: string
                        enum:
                          - high
                          - urgent
                        description: The importance of the message
                        example: high
              example:
                - id: message-1
                  participant_id: user1
                  text: Whats your favorite color?
                  content_type: text/plain
                  timestamp: '2023-06-07T13:08:43Z'
                - id: message-2
                  participant_id: user1
                  text: Hey want to go to lunch?
                  content_type: text/plain
                  timestamp: '2023-06-07T14:08:43Z'
                - id: message-3
                  participant_id: user2
                  text: Sorry! Totally thought I responded to this message. Its blue 💙 😀
                  content_type: text/plain
                  timestamp: '2023-06-07T14:09:43Z'
                  reply_to_message_id: message-1
                - id: message-4
                  participant_id: user2
                  text: Yes! Lets go to lunch. Want to go to Alreado's Pizza Cafe?
                  content_type: text/plain
                  timestamp: '2023-06-08T14:10:43Z'
                - id: message-5
                  participant_id: user1
                  text: Blue is okay, not my favorite
                  content_type: text/plain
                  timestamp: '2023-06-08T14:11:43Z'
                  deleted_timestamp: '2023-06-08T14:11:43Z'
                  reply_to_message_id: message-3
                - id: message-6
                  participant_id: user1
                  text: Thats my favorite too!
                  content_type: text/plain
                  timestamp: '2023-06-07T14:12:00Z'
                  reply_to_message_id: message-3
                - id: message-7
                  participant_id: user1
                  text: Lets do pizza by Alredo?
                  content_type: text/plain
                  timestamp: '2023-06-07T15:12:43Z'
                - id: message-8
                  participant_id: user1
                  text: Lets do pizza by Alredo!
                  content_type: text/plain
                  timestamp: '2023-06-07T15:13:43Z'
                  edited_message_id: message-7
                - id: message-9
                  participant_id: user1
                  text: 💙
                  content_type: text/plain
                  timestamp: '2023-06-07T15:14:43Z'
                  reaction_to_message_id: message-3
            attachments:
              type: array
              description: An array of meta data for all the attachments. If there are no attachments, this should just be an empty array.
              items:
                type: object
                required:
                  - id
                  - name
                  - content_type
