  /identities/extra_attributes/{id}/make_primary:
    put:
      tags:
        - Identities
      summary: Make an extra_attribute the primary
      description: |
        **REQUIRED PERMISSION:** `identities:update`  
        **RATE LIMIT:** `light`  
        **NOTE:**
        Makes the extra_attribute the primary attribute on the identity by swapping the values. <br />
        Example: Given the following identity:<br />
        ``` json
        {
            "identity": {
              "created_at": "2021-06-16T01:37:04.262Z",
              "email": "john.smith@gmail.com", <-- Notice the email before API call
              "external_id": "it-236",
              "extra_attributes": [
                {
                  "field": "email",
                  "id": 42035,
                  "value": "john@smith.com" <-- Notice the email before API call
                }
              ],
              "globally_risky": false,
              "id": 88484,
              "is_submitter": true,
              "name": "John Smith",
              "participant": false,
              "phone_number": "555-867-5309",
              "risky": false,
              "updated_at": "2022-10-12T02:29:49.146Z"
          }
        }
        ```
        A call to `/identities/extra_attributes/42035/make_primary` would result in the following:
        ``` json
        {
          "identity": {
            "created_at": "2021-06-16T01:37:04.262Z",
            "email": "john@smith.com", <-- Notice the swapped email after API call
            "external_id": "it-236",
            "extra_attributes": [
              {
                "field": "email",
                "id": 42035,
                "value": "john.smith@gmail.com" <-- Notice the swapped email after API call
              }
            ],
            "globally_risky": false,
            "id": 88484,
            "is_submitter": true,
            "name": "John Smith",
            "participant": false,
            "phone_number": "555-867-5309",
            "risky": false,
            "updated_at": "2022-10-12T02:29:49.146Z"
          }
        }
        ```
      parameters:
        - name: id
          in: path
          description: The extra_attribute ID to make primary
          required: true
          schema:
            type: integer
            example: 1052382
      responses:
        '200':
          description: The identity that owns the promoted extra_attribute
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PutExtraAttributePrimaryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
