      summary: Check data already exists
      description: |
        **REQUIRED PERMISSION:** `ingestion:read`  
        **RATE LIMIT:** `light`  
        **NOTE:** This endpoint supports searching for multiple datums. Because of this behavior it will never return a 404 Not Found, but instead just a blank response array.  
        Depending on the datum type (audio, chat, document, email, other, or video) different fields are returned. Fields that are always returned are denoted with a '*'.  
