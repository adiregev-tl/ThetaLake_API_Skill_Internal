    DateRange:
      type: object
      description: Specifies the date range for the reconciliation window. **The maximum allowed range is 7 days**. If no range is provided, the system defaults to the last 7 days from the current date, based on the upload_date.
      nullable: true
      properties:
        type:
          type: string
          enum:
            - create_date
            - upload_date
          description: The range type, default is *upload_date*
          example: upload_date
        start:
          type: string
          format: date-time
          example: '2025-02-11T01:37:04.262Z'
          description: '**Inclusive** start of the date range using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Defaults to 7 days from the current date if not specified'
        end:
          type: string
          format: date-time
          example: '2025-02-16T01:37:04.262Z'
          description: '**Exclusive** end of the date range using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Defaults to current date if not specified'
    QueryRequestV2:
      type: object
      required:
        - platform
        - attribute
      properties:
        attribute:
          type: object
          properties:
            name:
              type: string
              description: The name of the platform attribute
              example: channel_conversation_id
            value:
              type: string
              description: The value of the platform attribute
              example: DEBA5748-A73A-47BB-A2B9-5F05DC24E76F
        includes_timestamp:
          type: string
          format: date-time
          nullable: true
          description: |
            Records that contain the provided timestamp in the list of records in the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). This applies to select attributes,  for more information for more information see [the documentation on includes_timestamp](/documentation/reconciliation#includes_timestamp).
          example: '2025-02-15T01:37:04.262Z'
        integration_id:
          type: integer
          description: Filter records to those ingested by the integration identified with this ID. Must be used in conjunction with the platform field.
          example: 1579
          nullable: true
        media_types:
          type: array
          description: Filter the records by the media_type. If multiple values are provided, the results will be filtered by the OR operator
          items:
            type: string
            nullable: true
            description: Filter the records by the media_type
            enum:
              - audio
              - chat
              - document
              - email
              - other
              - video
          example:
            - audio
            - chat
        platform:
          type: string
          description: Third party platform to reconcile. [Supported platforms are documented here](/documentation/reconciliation)
          example: microsoft_teams
    RequestBodyV2:
      type: object
      properties:
        range:
          $ref: '#/components/schemas/DateRange'
        queries:
          type: array
