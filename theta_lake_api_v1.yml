          in: query
          description: The max number of items in each page
          required: false
          schema:
            type: integer
            example: 25
            minimum: 1
            maximum: 100
            default: 25
        - name: query
          in: query
          description: |
            Search across identity fields and identity extra_attributes: `email`, `name`, `phone_number`, `id`, and `external_id`. If `field_name` is specified the query will search only that field.
          required: false
          schema:
            type: string
            example: john@thetalake.com
        - name: field_name
          in: query
          description: If specified, query value will only check this field name
