    PostAuditLogsSearchRequest:
      type: object
      properties:
        auditable_action:
          type: array
          description: An auditable action to filter by (see response)
          items:
            $ref: '#/components/schemas/AuditableActionSnakeCase'
          example:
            - create
            - update
            - delete
        auditable_type:
          type: array
          description: An auditable type to filter by
          items:
            $ref: '#/components/schemas/AuditableTypeSnakeCase'
          example:
            - policy
            - record
        order:
          type: string
          description: The order to sort the audit logs by
          example: desc
        range:
          description: Filter audit_logs with created_at date starting at this value, uses the [RFC3339 full-date format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Defaults to 7 days ago if not specified.
          type: object
          properties:
            start:
              type: string
              format: date-time
              description: '**Inclusive** start of the date range using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Defaults to 7 days from the current date if not specified.'
              example: '2021-06-16T01:37:04.262Z'
            end:
              type: string
              format: date-time
              description: '**Exclusive** end of the date range using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Defaults to current date if not specified'
              example: '2021-06-16T01:37:04.262Z'
        source:
          type: object
          properties:
            type:
              type: string
              description: Audit log type to search by
              enum:
                - system
                - user
              example: user
            user_id:
              type: array
              description: A list of user IDs to filter by
              items:
                type: integer
                example: 123
              example:
                - 404
    PostAuditLogsSearchResponse:
      type: object
      properties:
        status_code:
          $ref: '#/components/schemas/StatusCode200'
        status_string:
          $ref: '#/components/schemas/StatusString200'
        request_id:
          $ref: '#/components/schemas/RequestId'
        paging:
          $ref: '#/components/schemas/Pagination'
        result:
          type: object
          description: The audit logs that match the query
          properties:
            total_hits:
              type: number
              description: This is the total hits for this search. This value will not change during pagination
              example: 24123
            default_range:
              type: boolean
              description: This indicates whether a date range was provided in the request or whether the default range (previous 7 days) was used
            range:
              type: object
              description: Filter audit_logs with created_at date starting at this value, uses the [RFC3339 full-date format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Defaults to 7 days ago if not specified.
              properties:
                start:
                  type: string
                  format: date-time
                  description: '**Inclusive** start of the date range using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Defaults to 7 days from the current date if not specified.'
                  example: '2021-06-16T01:37:04.262Z'
                end:
                  type: string
                  format: date-time
                  description: '**Exclusive** end of the date range using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Defaults to current date if not specified'
                  example: '2021-06-16T01:37:04.262Z'
            audit_logs:
              type: array
              description: The audit logs that match the query
              items:
                type: object
                properties:
                  audit_log_details:
                    type: array
                    nullable: true
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  auditable_action:
                    $ref: '#/components/schemas/AuditableActionSnakeCase'
                  auditable_id:
                    type: integer
                    description: A context sensitive ID for the entity that this audit log entry pertains to
                    example: 23
                  auditable_type:
                    $ref: '#/components/schemas/AuditableTypeSnakeCase'
                  created_at:
