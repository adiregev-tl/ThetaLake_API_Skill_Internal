openapi: 3.0.3
info:
  version: 1.23.0
  title: Theta Lake API
  description: |
    We are excited to inform you that our documentation is interactive!

    If you are logged in, this means that you can not only read about the features and capabilities of our product, but also try them out directly from the documentation pages.
    Our interactive documentation provides a hands-on experience that allows you to test the API endpoints, experiment with the input parameters,
    and see the corresponding responses. This makes it easier to understand how the API works and how to integrate it into your own applications.
    With interactive documentation, you can save time and avoid frustration by testing the API right from the documentation pages,
    without having to set up a local development environment. Whether you're a seasoned developer or just starting out, our interactive documentation
    is the perfect tool to help you learn, experiment, and succeed with our API.
security:
  - BearerAuth: []
  - ClientCredentials: []
paths:
  /analysis/policies:
    get:
      tags:
        - Analysis
      summary: List all policies
      description: |
        **REQUIRED PERMISSIONS:** `policies:read`  
        **RATE LIMIT:** `heavy`
      responses:
        '200':
          description: A list of policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllPoliciesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /analysis/policies/{id}:
    get:
      tags:
        - Analysis
      summary: Get a policy by id
      description: |
        **REQUIRED PERMISSIONS:** `policies:read`  
        **RATE LIMIT:** `heavy`
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the policy to get
          schema:
            type: integer
            example: 147
      responses:
        '200':
          description: A policy with its detection rules and SWRV rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPolicyByIdResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /analysis/policy_hits:
    get:
      tags:
        - Analysis
      summary: List all policy hits
      description: |
        **REQUIRED PERMISSIONS:** `analysis:read`  
        **RATE LIMIT:** `medium`
      responses:
        '200':
          description: A list of policy hits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllPolicyHitsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /audit_logs:
    get:
      tags:
        - Audit Logs
      summary: List all audit logs
      deprecated: true
      description: |
        **REQUIRED PERMISSIONS:** `audit_logs:read`  
        **RATE LIMIT:** `heavy`  

        **NOTE:** This endpoint is deprecated and will be removed on August 1, 2026 at 00:00 UTC. Please use the [audit_logs/search](/api-reference#post-/audit_logs/search) endpoint instead.
      parameters:
        - name: user_id
          in: query
          description: An user ID to filter by
          required: false
          schema:
            type: integer
        - name: auditable_type
          in: query
          description: An auditable type to filter by
          required: false
          schema:
            $ref: '#/components/schemas/AuditableType'
        - name: from_date
          in: query
          description: Filter audit_logs with created_at date starting at this value, uses the [RFC3339 full-date format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Defaults to 7 days ago if not specified.
          required: false
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          description: Filter audit_logs with created_at date ending at this value, uses the [RFC3339 full-date format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Defaults to now if not specified.
          required: false
          schema:
            type: string
            format: date
        - name: auditable_action
          in: query
          description: An auditable action to filter by (see response)
          required: false
          schema:
            $ref: '#/components/schemas/AuditableAction'
        - name: order
          in: query
          description: The order to sort the audit logs by
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
            example: desc
        - name: page_token
          in: query
          description: The page token to query next, this comes from the `paging` in the response. This can be either `next_page_token` or `prev_page_token`
          required: false
          schema:
            type: string
        - name: max
          in: query
          description: The max number of items in each page
          required: false
          schema:
            type: integer
            example: 25
            minimum: 1
            maximum: 500
            default: 25
      responses:
        '200':
          description: Returns a paginated list of org_unit's audit_logs matching the criteria, and the allowed values for the auditable type and action filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAuditLogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /audit_logs/config_change:
    get:
      tags:
        - Audit Logs
      summary: List all configuration change audit logs
      description: |
        **REQUIRED PERMISSIONS:** `audit_logs:read`  
        **RATE LIMIT:** `heavy`

        **NOTE:**
        Gets an (optionally filtered) list of audit logs for configuration changes related to the current user's org unit.
        This will contain the following auditable types:
        - Archive Bucket
        - Directory Group
        - Disclaimer Group
        - Entry Strategy
        - Integration
        - License
        - Microsoft Teams Disclaimer
        - Org Unit
        - Policy
        - Role
        - Storage Account
        - Supervision Space
        - Workflow

        And the following auditable actions:
        - Create
        - Update
        - Delete
        - Disable
        - Enable
      parameters:
        - name: user_id
          in: query
          description: An user ID to filter by
          required: false
          schema:
            type: integer
        - name: from_date
          in: query
          description: '**Inclusive** start of the date range using the RFC3339 full-date format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Defaults to 7 days ago if not specified.'
          required: false
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          description: '**Inclusive** end of the date range using the [RFC3339 full-date format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6). Defaults to now if not specified.'
          required: false
          schema:
            type: string
            format: date
        - name: page_token
          in: query
          description: The page token to query next, this comes from the `paging` in the response. This can be either `next_page_token` or `prev_page_token`
          required: false
          schema:
            type: string
        - name: order
          in: query
          description: The order to sort the audit logs by
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
            example: desc
        - name: max
          in: query
          description: The max number of items in each page; default is 25
          required: false
          schema:
            type: integer
            example: 25
            default: 25
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Returns a paginated list of org_unit's audit_logs matching the criteria, for configuration changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAuditLogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /audit_logs/search:
    post:
      tags:
        - Audit Logs
      summary: Search all audit logs
      description: |
        **REQUIRED PERMISSIONS:** `audit_logs:read`  
        **RATE LIMIT:** `heavy`  

        **NOTE:** Returns a list of audit logs that match search parameters. This page supports pagination but does not support previous pages. The `next_page_token` is only valid for 60 seconds.
      parameters:
        - name: page_token
          in: query
          description: The page token to query next, this comes from the `paging` in the response. Only the `next_page_token` will be populated and expires in 60 seconds.
          required: false
          schema:
            type: string
        - name: max
          in: query
          description: The max number of items in each page; default is 25, must not be more than 500
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 25
            example: 50
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostAuditLogsSearchRequest'
      responses:
        '200':
          description: Returns a list of audit logs matching the search
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostAuditLogsSearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /cases:
    get:
      tags:
        - Cases
      summary: List all cases
      description: |
        **REQUIRED PERMISSIONS:** `cases:read`  
        **RATE LIMIT:** `heavy`
      parameters:
        - name: page_token
          in: query
          description: The page token to query next, this comes from the `paging` in the response. This can be either `next_page_token` or `prev_page_token`
          required: false
          schema:
            type: string
        - name: max
          in: query
          description: The max number of items in each page
          required: false
          schema:
            type: integer
            example: 25
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: A paginated list of cases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCasesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags:
        - Cases
      summary: Create new case
      description: |
        **REQUIRED PERMISSIONS:** `cases:create`  
        **RATE LIMIT:** `heavy`
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCaseBody'
      responses:
        '200':
          description: The created case
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /cases/{id}:
    get:
      tags:
        - Cases
      summary: Get case by ID
      description: |
        **REQUIRED PERMISSIONS:** `cases:read`  
        **RATE LIMIT:** `heavy`
      parameters:
        - name: id
          in: path
          description: The ID of the case to retrieve
          required: true
          schema:
            type: integer
            example: 787
      responses:
        '200':
          description: The case with the given ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    put:
      tags:
        - Cases
      summary: Update a case
      description: |
        **REQUIRED PERMISSIONS:** `cases:update`  
        **RATE LIMIT:** `heavy`
      parameters:
        - name: id
          in: path
          description: The ID of the case to update
          required: true
          schema:
            type: integer
            example: 628
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCaseBody'
      responses:
        '200':
          description: The updated case
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /cases/{id}/records:
    post:
      tags:
        - Cases
      summary: Add records to a case
      description: |
        **REQUIRED PERMISSIONS:** `cases:add_records`  
        **RATE LIMIT:** `heavy`
      parameters:
        - name: id
          in: path
          description: The ID of the case to add records to
          required: true
          schema:
            type: integer
            example: 271
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddRecordIdsToCaseBody'
      responses:
        '201':
          description: The response containing the added record ids
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddRecordIdsToCaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      tags:
        - Cases
      summary: Remove records from a case
      description: |
        **REQUIRED PERMISSIONS:** `cases:remove_records`  
        **RATE LIMIT:** `heavy`
      parameters:
        - name: id
          in: path
          description: The ID of the case to remove records from
          required: true
          schema:
            type: integer
            example: 271
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveRecordIdsFromCaseBody'
      responses:
        '200':
          description: The response containing the removed record ids
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoveRecordIdsFromCaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /cases/{id}/close:
    put:
      tags:
        - Cases
      summary: Close a case
      description: |
        **REQUIRED PERMISSIONS:** `cases:update`  
        **RATE LIMIT:** `heavy`  
        **NOTE:** This endpoint closes the case, it does not delete it.
      parameters:
        - name: id
          in: path
          description: The ID of the case to close
          required: true
          schema:
            type: integer
            example: 628
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseCaseBody'
      responses:
        '200':
          description: The closed case
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /cases/{id}/open:
    put:
      tags:
        - Cases
      summary: Reopen a case
      description: |
        **REQUIRED PERMISSIONS:** `cases:update`  
        **RATE LIMIT:** `heavy`  
        **NOTE:** This endpoint reopens a case that has been closed
      parameters:
        - name: id
          in: path
          description: The ID of the case to reopen
          required: true
          schema:
            type: integer
            example: 628
      responses:
        '200':
          description: The reopened case
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /cases/{id}/managers:
    put:
      tags:
        - Cases
      summary: Add manager to case
      description: |
        **REQUIRED PERMISSIONS:** `cases:update`  
        **RATE LIMIT:** `heavy`
      parameters:
        - name: id
          in: path
          description: The ID of the case to add a manager to
          required: true
          schema:
            type: integer
            example: 787
            minimum: 1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  description: The ID of the user to add as a manager to the case
                  example: 422
      responses:
        '200':
          description: The case with the new manager added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddManagerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /cases/{id}/managers/{user_id}:
    delete:
      tags:
        - Cases
      summary: Remove manager from case
      description: |
        **REQUIRED PERMISSIONS:** `cases:update`  
        **RATE LIMIT:** `heavy`
      parameters:
        - name: id
          in: path
          description: The ID of the case to remove a manager from
          required: true
          schema:
            type: integer
            example: 787
            minimum: 1
        - name: user_id
          in: path
          description: The ID of the user to remove from the case
          required: true
          schema:
            type: integer
            example: 422
            minimum: 1
      responses:
        '200':
          description: The case with the manager removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoveManagerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /directory_groups:
    get:
      tags:
        - Directory Groups
      summary: List all directory groups
      description: |
        **REQUIRED PERMISSION:** `directory_groups:read`  
        **RATE LIMIT:** `light`
      parameters:
        - name: page_token
          in: query
          description: The page token to query next, this comes from the `paging` in the response. This can be either `next_page_token` or `prev_page_token`
          required: false
          schema:
            type: string
        - name: max
          in: query
          description: The max number of items in each page; default is 25,  max is 500
          required: false
          schema:
            type: integer
            example: 25
            minimum: 1
            maximum: 500
        - name: include_identities
          in: query
          description: Include the identities in the response. Defaults to **true**
          required: false
          schema:
            type: boolean
            example: true
      responses:
        '200':
          description: The response contains a paged list of directory groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDirectoryGroupResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags:
        - Directory Groups
      summary: Create a new directory group
      description: |
        **REQUIRED PERMISSION:** `directory_groups:create`  
        **RATE LIMIT:** `light`
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostDirectoryGroupRequest'
      responses:
        '200':
          description: The response contains a list of directory groups with optional paging.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDirectoryGroupResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /directory_groups/{id}:
    get:
      tags:
        - Directory Groups
      summary: Get directory group by ID
      description: |
        **REQUIRED PERMISSION:** `directory_groups:read`  
        **RATE LIMIT:** `light`
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the directory group to get
          schema:
            type: integer
            example: 1988
        - name: include_identities
          in: query
          description: Include the identities in the response. Defaults to **true**
          required: false
          schema:
            type: boolean
            example: true
      responses:
        '200':
          description: Responds with the directory group and the associated identities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDirectoryGroupByIdResponse'
        '401':
