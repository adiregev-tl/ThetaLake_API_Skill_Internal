      summary: Add participants to supervision space
      description: |
        **REQUIRED PERMISSION:** `supervision_spaces:update`  
        **RATE LIMIT:** `heavy`  
        **NOTE:**
        This route can be used to add participants to supervision spaces. The `participants_text` is a semi-CSV style list of name, email, or phone number separated by newlines.
        ```
        {
          "participants_text": "johnsmith@example.com\nBob Jones, bob@example.com\nJames K Anderson, james@example.com, 123-333-4567\n"
        }
        ```
        As shown in the example, the syntax is semi-CSV because any of the fields can be omitted.
        Internally the fields are parsed and used to search through known identities. If a match is found, the identity is added to the supervision space. If a match is not found, a new identity is created and added to the supervision space.
      parameters:
        - name: id
          in: path
          required: true
          description: The supervision space ID
          schema:
            type: integer
            example: 120
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                participants_text:
                  type: string
                  description: A semi-CSV style list of newline separated name, email, or phone numbers that are associated with an identity
                  example: |
                    johnsmith@example.com
                    Bob Jones, bob@example.com
                    James K Anderson, james@example.com, 123-333-4567
