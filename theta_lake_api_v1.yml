                type: string
                description: If the upload was a URL (via the text/x-uri Content-Type), this field will hold the original URI used to download the content
                example: https://youtu.be/dQw4w9WgXcQ
              publishing_type:
                $ref: '#/components/schemas/publishing_type'
              transport_type:
                type: string
                description: MIME formated string which identifies the platform from which the datum was generated
                example: video/zoomarchive
              upload_date:
                type: string
                format: date-time
                description: The datum upload timestamp using the [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
                example: '2023-06-07T13:13:50.925Z'
              uuid:
                type: string
                description: Generated by the ingestion service to uniquely identify the datum
                example: a50e8729-0453-5908-02a7-50f6e0e9c654
              video_type:
                $ref: '#/components/schemas/video_type'
    platform_attributes:
      type: object
      description: An open set of key-value pairs that can be used to store platform attributes. API platform attributes are only searchable by exact string match.
      additionalProperties:
        type: string
        description: Key-value pairs
      example:
        call_id: 2909b385-f84c-4935-bef0-87e6c6a3939b
        channel_id: '4'
        duration: 1h02m29s
    participant_id:
      type: string
      description: The unique identifier from the original platform where the content was generated
      example: abc123
    ingestion_schemas-name:
      type: string
      description: The participant's name as a single string
      example: John Doe
    first_name:
      type: string
      description: The participant's first name
      example: John
    last_name:
      type: string
      description: The participant's last name
      example: Doe
    schemas-email:
      type: string
      description: The participant's email address
      example: john.doe@email.com
    schemas-phone_number:
      type: string
      description: The participant's phone number. This phone number can only be digits with an optional '+' prefix
      example: '+5551234567'
    ai_interaction_participants:
      type: object
      description: |
        A map of role names to arrays of participant objects, where the keys in the map can be any of the following  participant role names: **activemember**.
      additionalProperties:
        type: array
        items:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/participant_id'
            name:
              $ref: '#/components/schemas/ingestion_schemas-name'
            first_name:
              $ref: '#/components/schemas/first_name'
            last_name:
              $ref: '#/components/schemas/last_name'
            email:
              $ref: '#/components/schemas/schemas-email'
            phone_number:
              $ref: '#/components/schemas/schemas-phone_number'
      example:
        activemember:
          - id: user-123
            name: Jim Halpert
            email: jim.halpert@dundermifflin.com
          - id: ai-456
            name: Computron
    message_id:
      type: string
      description: The message ID from the chat platform
      example: 7302e64f-2712-4e57-9dec-ada177b2d33b
    activemember_participant_id:
      type: string
      description: The ID of the participant that sent this message. This ID must correspond to an ID in the `meta.participants.activemember` array.
      example: user1234
    message_text:
      type: string
      description: The message's text
      example: Do you want go to lunch?
    message_content_type:
      type: string
      enum:
        - text/plain
        - application/html
        - text/markdown
      description: The message's content type
      example: text/plain
    message_timestamp:
      type: string
      format: date-time
      description: The message's timestamp in [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
      example: '2023-06-07T13:08:43Z'
    deleted_timestamp:
      type: string
      format: date-time
      description: The message's deleted timestamp in [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
      example: '2023-06-08T13:08:43Z'
    edited_message_id:
      description: The id of the message being edited
      type: string
      example: '12345921'
    reaction_to_message_id:
      description: The id of the message being reacted to
      type: string
      example: '12345921'
    reply_to_message_id:
      description: The id of the message being replied to
      type: string
      example: '12345921'
    attachment_ids:
      type: array
      description: The IDs of the attachments attached to this specific message
      items:
        type: string
      example:
        - example-attachment-id
    attachment_id:
      type: string
      description: A unique ID for the attachment. Used to reference attachments in the chat messages.
      example: example-attachment-id
    attachment_name:
      type: string
      description: The file name of the attachment. **Must match the file name of the actual attachment**
      example: shared_image.png
    attachment_size:
      type: integer
      description: The size in bytes of the attachment
      example: 355435
    attachment_content_type:
      type: string
      description: The content-type of the attachment. Uses standard [MIME types](https://www.iana.org/assignments/media-types/media-types.xhtml)
      example: image/png
    attachment_create_time:
      type: string
      format: date-time
      description: The creation timestamp of the attachment in [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
      example: '2023-06-08T13:08:43Z'
    PostAiInteractionBody:
      type: object
      properties:
        meta:
          type: object
          required:
            - file_name
            - identity_data
            - create_date
          properties:
            create_date:
              $ref: '#/components/schemas/create_date'
            custom_transport_type:
              $ref: '#/components/schemas/custom_transport_type'
            file_name:
              type: string
              description: This is the **title** of the AI interaction record.
              example: Conversation with ChatGPT on June 1st
            identity_data:
              $ref: '#/components/schemas/identity_data'
            platform_attributes:
              $ref: '#/components/schemas/platform_attributes'
            participants:
              $ref: '#/components/schemas/ai_interaction_participants'
        ai_interaction:
          type: object
          required:
            - application
            - conversation
            - participants
            - messages
            - attachments
          additionalProperties: false
          properties:
            application:
              type: object
              additionalProperties: false
              required:
                - name
              properties:
                name:
                  type: string
                  description: The name of the application hosting the AI interaction
                  example: ChatGPT
            model:
              type: object
              additionalProperties: false
              required:
                - name
              properties:
                name:
                  type: string
                  description: The name of the AI model used in the interaction
                  example: GPT-4
                provider:
                  type: string
                  description: The provider of the AI model
                  example: OpenAI
                version:
                  type: string
                  description: The version of the AI model
                  example: '2024-03-15'
                temperature:
                  type: string
                  description: The temperature setting used for the AI model
                  example: '0.7'
                max_tokens:
                  type: string
                  description: The maximum number of tokens used in the AI model
                  example: '2048'
            conversation:
              type: object
              additionalProperties: false
              required:
                - id
                - name
                - begin_time
                - end_time
              properties:
                id:
                  type: string
                  description: The AI interaction conversation ID
                  example: claude_chat_01SRJsrWaqczVoPgPNBps7yW
                name:
                  type: string
                  description: The AI interaction conversation name
                  example: Chat with Claude on June 1st
                begin_time:
                  type: string
                  format: date-time
                  description: The AI interaction conversation start time in [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
                  example: '2024-06-01T14:30:00Z'
                end_time:
                  type: string
                  format: date-time
                  description: The AI interaction conversation end time in [RFC3339 date-time format](https://www.rfc-editor.org/rfc/rfc3339#section-5.6)
                  example: '2024-06-01T15:00:00Z'
                previous_uuid:
                  type: string
                  description: The UUID of the previous AI interaction in the conversation. Required if connecting multiple AI interactions in a conversation.
                  example: a50e8729-0453-5908-02a7-50f6e0e9c654
            messages:
              type: array
              items:
                type: object
                required:
                  - id
                  - participant_id
                  - text
                  - content_type
                  - timestamp
                properties:
                  id:
                    $ref: '#/components/schemas/message_id'
                  participant_id:
                    $ref: '#/components/schemas/activemember_participant_id'
                  text:
                    $ref: '#/components/schemas/message_text'
                  content_type:
                    $ref: '#/components/schemas/message_content_type'
                  timestamp:
                    $ref: '#/components/schemas/message_timestamp'
                  message_type:
                    type: string
                    description: The type of message in the AI interaction
                    enum:
                      - message
                      - prompt
                      - systemprompt
                      - disclaimer
                    example: message
                  tokens_used:
                    type: string
                    description: The number of tokens used by the AI interaction message
                    example: '150'
                  confidence_score:
                    type: string
                    description: The confidence score of the AI interaction message
                    example: '0.95'
                  stop_reason:
                    type: string
                    description: The reason the AI interaction message was stopped
                    example: max_tokens
                  explanation:
                    type: string
                    description: Explanation for the AI interaction message
                    example: The model reached the maximum token limit.
                  reasoning:
                    type: string
                    description: The reasoning behind the AI interaction message
                    example: The model inferred the user wanted a summary.
                  latency:
                    type: string
                    description: The latency of the AI interaction message in milliseconds
                    example: '250'
                  deleted_timestamp:
                    $ref: '#/components/schemas/deleted_timestamp'
                  edited_message_id:
                    $ref: '#/components/schemas/edited_message_id'
                  reaction_to_message_id:
                    $ref: '#/components/schemas/reaction_to_message_id'
                  reply_to_message_id:
                    $ref: '#/components/schemas/reply_to_message_id'
                  attachment_ids:
                    $ref: '#/components/schemas/attachment_ids'
              example:
                - id: msg-001
                  participant_id: user-123
                  text: What is the capital of France?
                  content_type: text/plain
                  timestamp: '2024-06-01T14:31:00Z'
                - id: msg-002
                  participant_id: ai-456
                  text: The capital of France is Paris.
                  reply_to_message_id: msg-001
                  content_type: text/plain
                  timestamp: '2024-06-01T14:31:05Z'
            attachments:
              type: array
              description: An array of meta data for all the attachments. If there are no attachments, this should just be an empty array.
              items:
                type: object
                required:
                  - id
                  - name
                  - content_type
                properties:
                  id:
                    $ref: '#/components/schemas/attachment_id'
                  name:
                    $ref: '#/components/schemas/attachment_name'
                  size:
                    $ref: '#/components/schemas/attachment_size'
                  content_type:
                    $ref: '#/components/schemas/attachment_content_type'
                  create_time:
                    $ref: '#/components/schemas/attachment_create_time'
        attachments:
          type: array
          description: The actual attachment files from the AI interaction messages
          items:
            type: string
            format: binary
    response_content_type:
